<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>quote-card — sample artifact (Shane Logsdon · The AX Shift)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root {
  --color-surface: #fbfaf5;
  --color-ink: #181b21;
  --color-ink-soft: #404550;
  --color-ink-3: #62686f;
  --color-rule: #d6d8de;
  --color-accent: #c26a3b;
  --type-display: 'Fraunces', Georgia, serif;
  --type-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #2a2a2a; min-height: 100vh; font-family: var(--type-display); }
body { display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 32px 0; }

.canvas-label { font-family: var(--type-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.65); align-self: center; }

/*
  SAMPLE ARTIFACT — quote-card skill
  Brand: Shane Logsdon (v1)
  Quote source: "The AX Shift" — 2026.04.27

  Variation choices:
    archetype:  type-only (no chrome, no quote glyphs — typography is everything)
    layout:     bottom-anchored (NOT centered — center is the AI default this skill avoids)
    color:      monochrome cream (no accent on words — let the quote land alone)

  The brand IS the speaker — no "— Shane Logsdon" attribution (would read as cliché).
  Source folio in lower corner is publication convention, not decorative footer.
*/

.canvas-square {
  width: 1080px; height: 1080px;
  background: var(--color-surface);
  color: var(--color-ink);
  position: relative; overflow: hidden;
  padding: 96px 96px 80px;
  display: grid;
  grid-template-rows: 1fr auto;
  align-items: end;
}

.quote {
  font-family: var(--type-display);
  font-weight: 400;
  font-size: 124px;
  line-height: 1.04;
  letter-spacing: -0.02em;
  margin: 0;
  color: var(--color-ink);
  align-self: end;
}

.source {
  margin-top: 56px;
  padding-top: 16px;
  border-top: 1px solid var(--color-rule);
  font-family: var(--type-mono);
  font-size: 14px; letter-spacing: 0.06em;
  color: var(--color-ink-3);
  display: flex;
  justify-content: space-between;
}
.source .sigil { color: rgba(24,27,33,0.4); margin-right: 6px; }
.source .pos { color: var(--color-ink); }

.canvas-story {
  width: 1080px; height: 1920px;
  background: var(--color-surface);
  color: var(--color-ink);
  position: relative; overflow: hidden;
  padding: 270px 96px 240px;
  display: grid;
  grid-template-rows: 1fr auto;
  align-items: end;
}
.canvas-story .quote {
  font-size: 132px;
  line-height: 1.06;
}
.canvas-story .source { margin-top: 64px; }
</style>
</head>
<body>

<span class="canvas-label">→ Square · 1080×1080 · IG feed / LinkedIn</span>
<article class="canvas-square">
  <p class="quote">The thing I kept adjusting wasn't the problem.</p>
  <div class="source">
    <span><span class="sigil">§</span> The AX Shift · field note <span class="pos">2026.04.27</span></span>
    <span>shane.logsdon.io</span>
  </div>
</article>

<span class="canvas-label">→ Story · 1080×1920 · IG Story / Reel cover</span>
<article class="canvas-story">
  <p class="quote">The thing I kept adjusting wasn't the problem.</p>
  <div class="source">
    <span><span class="sigil">§</span> The AX Shift · field note <span class="pos">2026.04.27</span></span>
    <span>shane.logsdon.io</span>
  </div>
</article>
</body>
</html>

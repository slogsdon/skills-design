<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>instagram-post — sample artifact (Tail, hypothetical observability brand)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
:root {
  --color-ink: #e6e8ec; --color-ink-soft: #8b94a3; --color-ink-muted: #5b6371; --color-surface: #0d1015; --color-rule: #2a313c; --color-ok: #6dab7a; --color-crit: #c75050;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #2a2a2a; min-height: 100vh; display: grid; place-items: center; font-family: 'JetBrains Mono', ui-monospace, monospace; }

/*
  SAMPLE ARTIFACT — instagram-post skill (portrait mode)
  Brand: Tail (hypothetical) — same brand as other platform samples.

  Mode: portrait (1080×1350)

  Architecture archetype: vertical-stack
    A list of false-alarm causes accumulates down the canvas, each on its
    own line as a strikethrough log entry. The final block turns —
    indictment + answer. Vertical canvas earns this rhythm.

  Layout:        top-anchored stack with bottom punchline
  Type pressure: display-dominant
  Color usage:   monochrome surface (no color emphasis on words — the
                 strikethroughs do the visual work)
  Composition:   list-led / vertical-stack

  Anti-tell verification (per design-anti-patterns.md):
    §2 — no italics; no single-word color-emphasis (previous iteration
         colored "None mattered" green — fixed: stays in ink, the
         strikethroughs above carry the visual punch)
    §4 — no top-metadata-row eyebrow disguise (the date range is genuinely
         the data being communicated, not chrome decoration); no 3-column
         footer-row (just a single wordmark sign-off in display weight)
    §5 — no editorial-cosplay markers
    §7 — brand mark placement varies from other artifacts: full-line bottom
         signature in display weight, not a corner mark or footer row
*/

.canvas {
  width: 1080px;
  height: 1350px;
  background: var(--color-surface);
  color: var(--color-ink);
  position: relative;
  overflow: hidden;
  padding: 96px 80px 88px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 28px;
}

.timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  letter-spacing: 0.14em;
  color: var(--color-ink-muted);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--color-rule);
}

.stack {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 60px;
  line-height: 1.08;
  letter-spacing: -0.014em;
  color: var(--color-ink);
}

.stack .item {
  position: relative;
  color: var(--color-ink-soft);
  text-decoration: line-through;
  text-decoration-color: var(--color-ink-muted);
  text-decoration-thickness: 2px;
  text-underline-offset: 0.2em;
}

.stack .item .ts {
  display: inline-block;
  font-size: 18px;
  letter-spacing: 0.14em;
  color: var(--color-ink-muted);
  text-transform: uppercase;
  text-decoration: none;
  margin-right: 18px;
  vertical-align: 0.45em;
  font-weight: 500;
}

.stack .turn {
  margin-top: 36px;
  padding-top: 32px;
  border-top: 1px solid var(--color-rule);
  font-weight: 700;
  font-size: 76px;
  line-height: 1.05;
  letter-spacing: -0.018em;
  color: var(--color-ink);
  text-decoration: none;
}

.signoff {
  padding-top: 18px;
  border-top: 1px solid var(--color-rule);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 38px;
  line-height: 1;
  letter-spacing: -0.012em;
  color: var(--color-ink);
}

.signoff .meta {
  display: inline-block;
  margin-left: 24px;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: var(--color-ink-muted);
  text-transform: uppercase;
  vertical-align: 0.4em;
}

@page { size: 1080px 1350px; margin: 0; }
</style>
</head>
<body>
<article class="canvas">
  <header class="timestamp">
    <span>2026.04.01 → 2026.05.02</span>
    <span>49 days · production</span>
  </header>
  <section class="stack">
    <p class="item"><span class="ts">02:14</span>disk space at 78%.</p>
    <p class="item"><span class="ts">03:47</span>cache pool warm.</p>
    <p class="item"><span class="ts">04:02</span>queue length spike.</p>
    <p class="item"><span class="ts">05:31</span>p99 above threshold.</p>
    <p class="turn">All of these woke us up.<br>None mattered.</p>
  </section>
  <footer class="signoff">tail<span class="meta">tail.dev · on-call sanity</span></footer>
</article>

<!--
CAPTION (story style, ~900/2200 chars):

A representative week from our PagerDuty history:

02:14 — disk space at 78%
03:47 — cache pool warm
04:02 — queue length spike
05:31 — p99 above threshold

Four pages. Four trips to the laptop. None of them needed a human.

Most monitoring tools were built around thresholds. Thresholds are easy to define and almost always wrong — wrong for your traffic pattern, wrong for your seasonality, wrong for the version you shipped yesterday.

Tail watches behavior, not thresholds. It pages you when the system does something it hasn't done before. Disk usage at 78% on a Tuesday at 2 AM is not new. The system knows.

Self-hosted, Apache 2.0. Beta this month.

[hashtags in first comment]
-->
</body>
</html>

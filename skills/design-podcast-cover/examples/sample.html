<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>podcast-cover — sample artifact (Shane Logsdon · Working Notes podcast)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root {
  --color-surface: #fbfaf5;
  --color-paper-tint: #ebe8e2;
  --color-ink: #181b21;
  --color-ink-soft: #404550;
  --color-ink-3: #62686f;
  --color-rule: #d6d8de;
  --color-accent: #c26a3b;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #2a2a2a; min-height: 100vh; display: grid; place-items: center; font-family: 'Fraunces', Georgia, serif; }

/*
  SAMPLE ARTIFACT — podcast-cover skill
  Brand: Shane Logsdon (v1)
  Title: "Working Notes" — companion podcast to the field-notes editorial series

  Architecture: type-only (2-word title at maximum scale; no chrome)
  Layout:    bottom-anchored
  Color:     paper-tint surface (warm tan — v1 feature register, NOT dark inversion)
  Type:      display-dominant Fraunces

  Legibility check at 120×120 app-icon scale: "Working Notes." in massive Fraunces
  at 320px reads instantly even at 12× downscale. Period as visual stop, not accent.
*/

.canvas {
  width: 1500px; height: 1500px;
  background: var(--color-paper-tint);
  color: var(--color-ink);
  position: relative; overflow: hidden;
  padding: 100px;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

.top {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--color-rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--color-ink-3);
}
.top .sigil { color: rgba(24,27,33,0.4); margin-right: 8px; }
.top .pos { color: var(--color-ink); }

.title-wrap {
  display: grid;
  align-items: end;
  padding-bottom: 36px;
}
.title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 320px;
  line-height: 0.92;
  letter-spacing: -0.028em;
  margin: 0;
  color: var(--color-ink);
  font-feature-settings: 'ss01';
  /* Hand-broken for typographic rhythm: "Working / Notes." */
}
.title .line { display: block; }
.title .line-2 { /* slight indent for editorial rhythm */ padding-left: 0; }

.foot {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: baseline;
  padding-top: 22px;
  border-top: 1px solid var(--color-rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; letter-spacing: 0.06em;
  color: var(--color-ink-3);
}
.foot .mark {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 500;
  font-size: 32px;
  letter-spacing: -0.005em;
  color: var(--color-ink);
  display: inline-flex; align-items: center; gap: 12px;
  font-style: normal;
}
.foot .mark .init { font-family: 'JetBrains Mono', monospace; font-style: normal; font-size: 22px; letter-spacing: 0.22em; color: var(--color-ink-3); text-transform: uppercase; }
.foot .mark .pipe { display: inline-block; width: 1px; height: 22px; background: var(--color-rule); }
.foot .pos { color: var(--color-ink); }
</style>
</head>
<body>
<article class="canvas">
  <header class="top">
    <span><span class="sigil">§</span> A podcast on payments &amp; platforms</span>
    <span>Season <span class="pos">01</span></span>
  </header>
  <div class="title-wrap">
    <h1 class="title"><span class="line">Working</span><span class="line line-2">Notes.</span></h1>
  </div>
  <footer class="foot">
    <span class="mark">
      <span class="init">SL</span><span class="pipe"></span>Shane Logsdon
    </span>
    <span><span class="pos">2026</span> · shane.logsdon.io</span>
  </footer>
</article>

<!--
LEGIBILITY at 120×120 (app-icon thumb):
  Two stacked Fraunces words at 320px fill ~60% of vertical canvas — still
  reads clearly at 12× downscale. The "Working / Notes." stack scans as one mark.

EXPORT FOR APPLE PODCASTS (3000×3000):
  Open in browser → DevTools → 1500×1500 viewport → screenshot at 2× device scale.
  Or Playwright: --viewport-size "1500,1500" with device_scale_factor=2.
-->
</body>
</html>

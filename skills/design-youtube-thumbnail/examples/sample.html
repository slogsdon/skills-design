<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>youtube-thumbnail — sample artifact (Tail, hypothetical observability brand)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
:root {
  --color-ink: #e6e8ec; --color-ink-soft: #8b94a3; --color-ink-muted: #5b6371; --color-surface: #0d1015; --color-rule: #2a313c; --color-ok: #6dab7a;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #2a2a2a; min-height: 100vh; display: grid; place-items: center; font-family: 'JetBrains Mono', ui-monospace, monospace; }

/*
  SAMPLE ARTIFACT — youtube-thumbnail skill
  Brand: Tail (hypothetical) — same brand as other platform samples.

  Architecture archetype: number-led
    Single numeral fills 80% of vertical canvas. Caption beneath in tiny
    body type. The number is in --color-ok (semantic, not decorative —
    "0 false pages" IS a positive signal in this brand's tri-state palette,
    and green is used semantically throughout the brand for "ok" state).

  Layout:        full-text-takeover (centered, optical pull up)
  Type pressure: monolithic-display
  Color usage:   single-accent (semantic green on the figure, ink elsewhere)
  Composition:   number-led + minimal supporting label

  Anti-tell verification (per design-anti-patterns.md):
    §2 — no italics, no single-word emphasis (the green is doing semantic
         work — it's a signal-color used in its proper role across the brand,
         not decorative emphasis on a word)
    §4 — no chrome at all (no eyebrow, no footer-row, no marker)
    §5 — no `EP. 01` cosplay
    §7 — brand mark intentionally absent (channel page provides brand context)

  Video title (NOT on canvas): "Why we shipped fewer alerts, not better ones"
  Hook (on canvas): the figure 0
*/

.canvas {
  width: 1280px;
  height: 720px;
  background: var(--color-surface);
  color: var(--color-ink);
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-rows: 1fr auto;
  padding: 60px 80px 60px;
}

.figure-wrap {
  display: grid;
  place-items: center;
}

.figure {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 600px;
  line-height: 0.85;
  letter-spacing: -0.05em;
  color: var(--color-ok);
  margin: 0;
  transform: translateY(-2%);
}

.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--color-ink);
  text-align: center;
  margin: 0;
}

.label .meta {
  color: var(--color-ink-muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 14px;
  display: inline-block;
  margin-left: 12px;
}

@page { size: 1280px 720px; margin: 0; }
</style>
</head>
<body>
<article class="canvas">
  <div class="figure-wrap">
    <h1 class="figure">0</h1>
  </div>
  <p class="label">false pages this month <span class="meta">production · may 2026</span></p>
</article>

<!--
Legibility check at 240×135 (mobile feed thumb):
  - Figure at 600px fills ~80% of vertical canvas — instant read at 5x downscale
  - Green-on-dark contrast: #6dab7a on #0d1015 ≈ 7:1 (passes WCAG AA-large)
  - Caption is sacrificial at thumb size (acceptable — the 0 IS the hook)
  - No face, no arrow, no clickbait energy
-->
</body>
</html>

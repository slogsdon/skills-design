<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>obs-alert-overlay — sample artifact (Shane Logsdon · live coding alerts)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root {
  --color-surface: #fbfaf5;
  --color-ink: #181b21;
  --color-ink-soft: #404550;
  --color-ink-3: #62686f;
  --color-rule: #d6d8de;
  --color-accent: #c26a3b;
  --type-display: 'Fraunces', Georgia, serif;
  --type-sans: 'Inter', system-ui, sans-serif;
  --type-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 1920px; height: 1080px; overflow: hidden; background: transparent; font-family: var(--type-sans); color: var(--color-ink); font-feature-settings: 'ss01', 'cv11', 'kern'; }

/*
  SAMPLE ARTIFACT — obs-alert-overlay skill
  Brand: Shane Logsdon (v1)
  Use: live coding stream alerts (Twitch · twitch.tv/shanelogsdon)

  Variation choices (consistent across all 4 alert scenes):
    card-style:    hairline (cream surface + 1px border)
    type-pressure: display-led (Fraunces serif copy)
    color:         cream-card (cream surface on transparent overlay)
    position:      lower-right

  One animation per scene — slide-in + hold + fade as a single keyframe sequence.
  Accent color appears only on dynamic name token (semantic, marking the new entity).
*/

.scene { position: fixed; inset: 0; width: 1920px; height: 1080px; display: none; }
.scene.is-active { display: block; }

.alert-card {
  position: absolute;
  bottom: 80px; right: 80px;
  min-width: 480px; max-width: 720px;
  padding: 24px 32px;
  background: var(--color-surface);
  color: var(--color-ink);
  border: 1px solid var(--color-rule);
  animation: alert-sequence 4800ms cubic-bezier(0.2, 0.6, 0.2, 1) forwards;
}

@keyframes alert-sequence {
  0%   { transform: translateX(120%); opacity: 0; }
  12%  { transform: translateX(0);    opacity: 1; }
  92%  { transform: translateX(0);    opacity: 1; }
  100% { transform: translateX(0);    opacity: 0; }
}

.alert-card .label {
  font-family: var(--type-mono);
  font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--color-ink-3);
  margin: 0 0 10px;
}
.alert-card .label .sigil { color: rgba(24,27,33,0.4); margin-right: 6px; }
.alert-card .copy {
  font-family: var(--type-display);
  font-weight: 500;
  font-size: 32px; line-height: 1.18;
  letter-spacing: -0.012em;
  margin: 0;
  color: var(--color-ink);
}
.alert-card .copy .name { color: var(--color-accent); }
</style>
</head>
<body>
<!--
Stream Alert Overlay — Shane Logsdon · live coding (twitch.tv/shanelogsdon)
Single file, hash-routed. Load as OBS browser source at 1920×1080 (transparent).
Switch scenes via URL hash: #follow · #sub · #donation · #raid
Pass dynamic names via URL query: ?name=Sam&amount=10
-->

<section id="scene-follow" class="scene">
  <div class="alert-card">
    <p class="label"><span class="sigil">§</span> Follow</p>
    <p class="copy"><span class="name">jordan</span> just followed.</p>
  </div>
</section>

<section id="scene-sub" class="scene">
  <div class="alert-card">
    <p class="label"><span class="sigil">§</span> Subscriber</p>
    <p class="copy"><span class="name">priya</span> subscribed for six months.</p>
  </div>
</section>

<section id="scene-donation" class="scene">
  <div class="alert-card">
    <p class="label"><span class="sigil">§</span> Tip</p>
    <p class="copy"><span class="name">malik</span> sent $<span class="amount">25</span>.</p>
  </div>
</section>

<section id="scene-raid" class="scene">
  <div class="alert-card">
    <p class="label"><span class="sigil">§</span> Raid</p>
    <p class="copy"><span class="name">noor</span> raided with <span class="count">47</span>.</p>
  </div>
</section>

<script>
function activateScene() {
  var hash = (window.location.hash || '#follow').split('?')[0].slice(1);
  var scenes = document.querySelectorAll('.scene');
  scenes.forEach(function(el) { el.classList.toggle('is-active', el.id === 'scene-' + hash); });
  var params = new URLSearchParams(window.location.hash.split('?')[1] || '');
  ['name', 'amount', 'count'].forEach(function(key) {
    var val = params.get(key);
    if (!val) return;
    document.querySelectorAll('.scene.is-active .' + key).forEach(function(el) { el.textContent = val; });
  });
}
window.addEventListener('hashchange', activateScene);
activateScene();
</script>
</body>
</html>
